<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, 
    initial-scale=1.0">
    <title>The Dynamic Task Manager</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/heroicons@2.0.16/dist/heroicons.js"></script>
    <!-- Color Palete: #4B2E83 (bg); #2F2F2F (br, headings, bold); #FFFFFF (text) -->
</head>
<body class="bg-gray-100 text-gray-900 p-6 border-2 border-gray-300 rounded-lg shadow-lg">
    <header class="bg-gradient-to-r from-[#4B2E83] via-gray-400 to-[#4B2E83] text-white py-6 mb-8 shadow-lg flex items-center justify-center gap-4 rounded-lg border-2 border-gray-300">
       
        <!-- Logo -->
        <img src="assets/images/New Logo.jpeg" 
        alt="Company Logo" 
        class="w-14 h-14 hover:scale-105 hover:drop-shadow-xl transition-all duration-300 mb-4 rounded-full border-2 border-white mr-4">

        <h1 class="text-3xl font-bold text-center tracking-wide">
        The Dynamic Task Manager
        </h1>

        <!-- Logo -->
        <img src="assets/images/New Logo.jpeg" 
        alt="Company Logo" 
        class="w-14 h-14 hover:scale-105 hover:drop-shadow-xl transition-all duration-300 mb-4 rounded-full border-2 border-white mr-4">

    </header>

    <p class="text-center text-purple-700 max-w-xl max-w-xl mx-auto mb-8">
        Manage your tasks efficiently and efficiently!
    </p>

    <div class="max-w-md mx-auto p-6 rounded-xl shadow-xl border border-white/20 
            bg-white/70 backdrop-blur-xl dark:bg-gray-800/60 dark:border-gray-700/40">
        <h2 class="text-xl text-center font-semibold text-purple-800 mb-4">
            Task List
        </h2>

        <!-- Input Field -->
        <input 
            id="taskInput"
            type="text" 
            placeholder="Enter a new task..." 
            class="w-full p-3 border-2 border-purple-700 rounded-lg mb-4 focus:outline-none focus:border-gray-900"
            >
        <select 
            id="taskDropdown"
            class="w-full p-3 border-2 border-purple-700 rounded-lg mb-4">
            <option value="">Select a task to delete...</option>
        </select>

        <!-- Buttons -->
        <div class="flex flex-wrap gap-3 mb-4"
        >
            <button 
            id="addBtn"
            class="bg-purple-800 text-white px-4 py-2 rounded-lg font-semibold hover:bg-purple-900 over:bg-white hover:text-white hover:shadow-xl hover:-translate-y-1
                    transition-all duration-300">
            <ion-icon name="add-circle-outline"></ion-icon>
            Add Task
            </button>

            <button 
            id="deleteBtn"
            class="bg-gray-900 text-white px-4 py-2 rounded-lg font-semibold hover:bg-black over:bg-white hover:text-white hover:shadow-xl hover:-translate-y-1
                    transition-all duration-300">
            <ion-icon name="close-circle-outline"></ion-icon>            
            Delete Task
            </button>
            
            <button 
            id="clearBtn"
            class="bg-red-700 text-white px-4 py-2 rounded-lg font-semibold hover:bg-red-800 over:bg-white hover:text-white hover:shadow-xl hover:-translate-y-1
                    transition-all duration-300">
            <ion-icon name="nuclear-outline"></ion-icon>            
            Clear All
            </button>

            <p 
                id="messageBox"
                class="text-center font-semibold font-semibold">
            </p>
        </div>
    
        <!-- Show Task on Screen -->
        <ul 
        id="taskList"
        class="space-y-3">
            <li 
            class="flex items-center gap-3">
            </li>
        </ul>
    </div>

    <footer class="py-6 px-4 max-w-3xl mx-auto">

        <!-- Copy Right Notice -->
        <p>&copy; 2026 Trell'z DeZignz</p>
    </footer>

    <script src="script.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
